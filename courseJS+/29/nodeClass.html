<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .btn{
        font-size: 4rem;
        margin: 10px;
        border: none;
        border-radius: 5px;
        padding: 10px 15px;
        background-color: rgb(32, 112, 192);
        color: white;
    }
    .enb{
        color: black;
        background-color: tomato;
    }
    .des{
        color: wheat;
        background-color: plum;
    }
</style>
<body>
    <button class="btn">btn1</button>
    <button class="btn">btn2</button>
    <button class="btn">btn3</button>
    <button class="btn">btn4</button>
    <button class="btn">btn5</button>
</body>
</html>
<script>
/*NodeList = Static collection of HTML elements by (id, class, element)
           Can be created by using querySelectorAll()
           Similar to an array, but no (map, filter, reduce)
           NodeList won't update to automatically reflect changes
*/
const newBtn = document.createElement("button") ; //step 1;
newBtn.classList.add("btn")
newBtn.textContent = "btnClass"
document.body.appendChild(newBtn)

let btn = document.querySelectorAll(".btn") ;

btn.forEach(x => {
    x.addEventListener("click" ,() =>{
        x.style.backgroundColor === "rgb(32, 112, 192)" ?
        x.style.backgroundColor = "green" :
        x.style.backgroundColor = "rgb(32, 112, 192)";
        setTimeout(() => {x.remove()},5000)
        btn = document.querySelectorAll(".btn") ;
    })
})
/*CLASSLIST*/
/*
classList = Element property in JavaScript used to interact
            with an element's list of classes (CSS classes)
            Allows you to make reusable classes for many elements
            across your webpage.

add()
remove()
toggle(Remove if present, Add if not)
replace(oldClass, newClass)
contains('')           true / false if no class
*/
const classBtn = btn[btn.length -1]
console.log(classBtn)
classBtn.addEventListener("click", (e) =>{
    e.target.classList.toggle("enb")
})
classBtn.addEventListener("click", (e) =>{
    classBtn.classList.toggle("des")
})

</script>
