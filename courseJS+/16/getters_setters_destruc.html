    /*
    getter = special method that makes a property readable
    setter = special method that makes a property writeable
    ***validation and modify a value when reading/writing a property
    */
   class Rectangle {

    constructor (width,height){
        this.width = width;
        this.height = height;
    }
    set width(v1){
        v1 > 0 ? this._width=v1 : console.error("wrong width format .")
    }
    set height(v2){
        v2 > 0 ? this._height=v2 : console.error("wrong height format .")
    }
    get width(){return `${this._width.toFixed(1)}cm`;}
    get height(){return `${this._height.toFixed(1)}cm`}
    get area(){return `${(this._height * this._width).toFixed(1)}cm`}
   }
   class Tringle {

    constructor (width,height){
        this.width = width ;
        this.height = height ;
    }
    set width(v1){
        (typeof v1 !=="number" ||Number(v1) < 0) ? console.log("Error Wrong 'Width' format." ) : this._width = v1 ; 
    }
    set height(v2){
        (typeof v2 !=="number" ||Number(v2) < 0) ? console.log("Error Wrong 'Height' format." ) : this._height = v2 ; 
    }
    get width(){return this._width}
    get height(){return this._height}
    get area(){return `${((this._height * this._width)/2).toFixed(1)}cm`}
   }
