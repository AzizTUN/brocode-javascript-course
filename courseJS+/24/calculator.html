<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #keys{
            display: grid;
            grid-template-columns: repeat(4,110px);
            gap:10px;
            padding:25px ;
            
        }
        #calculator{
            font-family: arial;
            background-color: black;
            border-radius: 15px;
            max-width: 510px;
            overflow: hidden;
        }
        .gd{
            background-color: goldenrod;
            color: rgba(255, 255, 255, 0.886);
        }
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: hsla(0, 0%, 100%, 0.95);
        }
        button:hover{
            background-color: hsl(0, 0%, 40%);
        }
        button:active{
            background-color: hsl(0, 0%, 30%);
        }
        #disp{
            width: 100%;
            font-size: 4rem;
            padding:20px ;
            overflow-x: auto;
            text-align: left;
            border: none;
            background-color: hsl(0, 0%, 20%);
            color: white;
        }
        .gd:hover{background-color:hsl(43, 74%, 59%) ;}
        .gd:active{background-color:hsl(43, 74%, 49%) ;}
        .rd:hover{background-color: hsl(0, 100%, 60%);}
        .bl{background-color: rgba(0, 0, 255, 0.808);}
        .bl:hover{background-color: hsl(240, 100%, 60%);}
        .bl:active{background-color: hsl(240, 100%, 40%);}
        .rd:active{background-color: hsl(0, 100%, 40%);}
        button{
            width: 100px;
            height: 100px;
            border-radius: 50px;
            border: none;
            background-color: hsl(0, 0%, 30%);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            font-weight: bold;
        }
        .rd{background-color: red;}
    </style>
</head>
<body>
    <div id="calculator">
        <input id="disp" readonly>
        <div id="keys">
            <button class="gd" onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="gd" onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="gd" onclick="appendToDisplay('*')">*</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="gd" onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="bl" onclick="calculat()">=</button>
            <button class="rd" onclick="clearDisplay()">C</button>
        </div>
    </div>
</body>
</html>
<script>
    const appbtn = document.getElementById("disp");
    const T = [] ;
    function appendToDisplay(c){
        if (T.length === 0 && ("+*-/.".indexOf(c))!==-1){
            return
        }
        else if(("*-/+.".indexOf(T[T.length-1])!==-1 && ("+*-/.".indexOf(c))!==-1) || appbtn.value === "Error !"  ){
            return
        }
        else{
            appbtn.value +=c;
            T.push(c);
        }
    }

    function calculat(){
        try{
            let res = appbtn.value
            if(eval(res) === -Infinity ||eval(res) === Infinity || isNaN(eval(res))){
                throw Error ("errro u cant div par 0 !");
            }
            else{
                appbtn.value = eval(res)
            }
        }catch(err)
        {
            console.log(err)
            appbtn.value = "Error !"
        }
    }
    function clearDisplay(){
        appbtn.value = "";
        T.length = 0;
    }
</script>
