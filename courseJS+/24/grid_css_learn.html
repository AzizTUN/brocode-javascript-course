<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
        font-family: arial;
    }
    .parent{
        padding: 10px;
        background-color: firebrick;
        display: grid;
        margin:50px auto;
        width: 600px;
        grid-template-columns: repeat(5, minmax(50px, 1fr)); /*auto-fill*/
        grid-template-rows: repeat(5, minmax(auto, 1fr));
        height: calc(5*60px);
        row-gap: 10px;
        column-gap: 10px; /*gap:10px 10px*/
        justify-content:space-evenly ;/*x no fr*/ 
        align-content:space-between ;/**/
    }
    .parent div{
        background-color: goldenrod;
        /* padding: 5px; */
    }
</style>
<body>
    <div class="parent">
        <div class="item1">item1</div>
        <div class="item2">item2</div>
        <div class="item3">item3</div>
        <div class="item4">item4</div>
        <div class="item5">item5</div>
        <div class="item6">item6</div>
        <div class="item7">item7</div>
        <div class="item8">item8</div>
        <div class="item9">item9</div>
        <div class="item10">item10</div>
    </div>
</body>
</html>
