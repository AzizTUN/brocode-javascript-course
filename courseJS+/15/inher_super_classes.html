    class Animal {
        alive = true ;
        eat(){
            console.log(`this ${this.name} is eating`) ;
        }
        sleep(){
            console.log(`this ${this.name} is sleeping.`) ;
        }
    }
    class Rabbit extends Animal{
        name = "rabbit" ;
    }
    class Fish extends Animal{
        name = "fish" ;

            super();

            Fish.Nbr++;

    //mine !:
    class School {
        static ref = "09E74i" ;
        static nbr_school = 0 ;
        constructor (president, vicePresident ,place,foundation,type){
            this.president = president;
            this.vicePresident = vicePresident;
            this.place = place;
            this.foundation = foundation;
            this.type = type ;
            School.nbr_school++;
        }
        set type(v1){
            (typeof(v1)==="string" && ( v1 === "FREE" || v1 === "PAID")) ? 
            this._type = v1 : (()=>{ throw new Error("u can only give /paid || free for this type of school")});
        }
        get type(){
            return this._type;
        }
        set foundation(v2){
            (typeof(v2) !== "string" || isNaN(Date.parse(v2))  ) ?
            console.error("error Wrong date format !") : this._foundation = v2   ;
        }
        get foundation(){return this._foundation;}
    }
    class Sections extends School{
        static nbr = 0;
        constructor (name , avgMoy , popularityByYear,president, vicePresident, place, foundation, type){
            super(president, vicePresident, place, foundation, type);
            this.name= name;
            this.avgMoy = avgMoy;
            this.popularity = popularityByYear;
            Sections.nbr ++;
        }
        set avgMoy(v1){
            (typeof(v1) !=="number" || isNaN(v1) || Number(v1)>20 || Number(v1)<0) ?
            console.error("wrong format .. Number de {20..0}") : this._avgMoy = v1;
        }
        get avgMoy(){
            return this._avgMoy;
        }
    }
    class Professors extends School {
        static nbr = 0;

            this.Idcarde = Idcarde ;
            this.FullName = FullName ;
            this.grade = grade ;
            this.section = section;
            Professors.nbr++;

    class Peoples extends School{

            this.FullName = FullName ;
            this.grade = grade ;
            this.section = section ;
            this.behaviour = behaviour ;
            Peoples.nbr_people++;
        }
    }
