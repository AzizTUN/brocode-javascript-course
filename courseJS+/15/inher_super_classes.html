<script>
    /* inhertance = allow a new class to inherit propertis and methods from an existing
    class (parent -> child) helps with code reusability  LIKE A TREE*/
    class Animal {
        alive = true ;
        eat(){
            console.log(`this ${this.name} is eating`) ;
        }
        sleep(){
            console.log(`this ${this.name} is sleeping.`) ;
        }
    }
    class Rabbit extends Animal{
        name = "rabbit" ;
    }
    class Fish extends Animal{
        name = "fish" ;
        static Nbr = 0;
        constructor (type,price){
            super();
            this.type = type ;
            this.price = price ;
            Fish.Nbr++;
        }
    }
    class Hawk extends Animal{
        name = "hawk" ;
    }
