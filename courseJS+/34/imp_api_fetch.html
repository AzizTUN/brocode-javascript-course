   // fetch = Function used for making HTTP requests to fetch resources.

//         used for interacting with APIs to retrieve and send
//         data asynchronously over the web.

const img =document.querySelector("figure img") ;
const imgC =document.querySelector("figure figcaption") ;
const btn = document.querySelector("button") ;
const inp = document.querySelector("input[type='text']") ;
async function loadData(){
    try{
        const fck = await fetch(`https://pokeapi.co/api/v2/pokemon/${inp.value.toLowerCase()}`) ;
        if(!fck.ok){
            img.src = "" ;
            img.alt = "" ;
            throw new Error("can't load !")
        }
        const data = await fck.json()
        img.src = data.sprites.front_default ;
        img.alt = data.name ;
        imgC.textContent = data.name ;
        
    }catch(err){console.error(err)}
}
 const load = btn.addEventListener("click" , loadData)


</script>
