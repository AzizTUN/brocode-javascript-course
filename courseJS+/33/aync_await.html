<script>
    function brushTeeth(){
        return new Promise((res,rej) => {
            const isAlive = true ;
            setTimeout(() => {
                isAlive ? res("im brushing My teeth.") : rej("ur dead")
            }, 1500);
        })
    }
    function tookTheBus(){
        return new Promise((res,rej)=>{
            const stillAlive = false ;
            setTimeout( ()=>{
                stillAlive ? res("taking the bus."):rej("ur Dead.")
            },3000 )        
        })
    }
