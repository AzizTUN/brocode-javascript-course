<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        #container{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
        }
        button{
            font-size: 1.5rem;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background-color: hsl(210, 100%, 50%);
            color: white;
            font-weight: bold;
            transition: ease 0.5s;
            cursor: pointer;
        }
        button:hover{
            background-color: hsl(210, 100%, 30%);
            color: rgb(223, 223, 223);
            transform: scale(1.01);
        }
        input{
            font-size: 2rem;
            width: 150px;
            text-align: center;
            font-weight: bold;
        }
        #img{
            width: 40%;
            display: inline-block;
            margin: 20px;
        }
        img{
            width: 20% ;
        }
        #res{
            font-size: 1.6rem;
            color: rgb(128, 0, 0);
            text-transform: capitalize;
            text-shadow: 1px 1px 1.2px black;
            margin-top: 5px;
        }
        span{
            color: rgb(100, 6, 183);
        }
        h1{
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            animation-name: ght;
            animation-duration: 3s;
            animation-fill-mode: both;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            text-shadow: 1px 1px 1.2px black;;
        }
        @keyframes ght {
            from{
                color: rgb(11, 100, 11);
            }
            to{
                color: rgb(84, 75, 4);
            }
        }
    </style>

    <div id="container">
        <h1>Dice Roller</h1>
        <label for="x1"><span>#</span>of Dice </label>
        <input type="number" id="x1" value="1" min="1" max="6">
        <button>Rolle the Dice</button>
        <div id="res"></div>
        <div id="img"></div>
    </div>
</body>
</html>
<script>
    const btn = document.querySelector("button")
    const res = document.querySelector("#res")
    const img =  document.querySelector("#img")
    function verify(nbr){
        return (nbr.length !== 1 || !Number.isInteger(Number(nbr)) || Number(nbr)<=0 ) ? -1 : 0 ;
    }
    function rollDice(){
        const vlu = document.querySelector("input[type='number']").value ;
        const values = [] ;
        const images = [] ;
        if (verify(vlu)===-1)return alert("number !!!") ;
        for (let i = 0; i< vlu ; i++){
            const  gg = Math.trunc(1+Math.random()*6) ;
            values.push(gg) ;
            images.push(`<img src="../../docxJS+/${values[i]}.png" alt=${gg}>`);
            console.log(images[i])
        }
        res.textContent = `dice: ${values.join(' | ')}` ;
        img.innerHTML = images.join("") ;
    }
    btn.addEventListener("click",rollDice);
</script>
