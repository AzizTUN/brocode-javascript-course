<script>
    //special method for defining the prop and meth of obj . CONST ALWAYS START WITH CAPITALE !!
    const Car = function (make, model , year , color) {
        this.make = make;
        this.model = model;
        this.year = year;
        this.color = color;
        this.code = function (x) {return String.fromCharCode(65+Math.trunc(Math.random()*26),x,this.year)};
    }
    const car1 = new Car("BMW","iX",2025,"black") ;
    document.writeln(car1.make)
    document.writeln(car1.model);
    document.writeln(car1.code(97)) ;

</script>
