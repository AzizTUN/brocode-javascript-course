    //STATIC : keywordnthatbdefines properties or methods that belong to a class itself 
    // rather than the obj created from that class (class own anything static,not the objs)
    class MathUtil {
        static PI = 3.14159 ;

        static getDiameter(rd){
            return rd * 2;
        }

        static getCircumference(rd){
            return 2 * this.PI
        }

        static getArea(rd){
            return this.PI * rd * rd;
        }
    }
    console.log(MathUtil.PI);
    console.log(MathUtil.getDiameter(10));
    console.log(MathUtil.getCircumference(10));
    console.log(MathUtil.getArea(10));
