<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
 <style>
    main{
        text-align: center;
        margin-top: 80px;
    }
    div{
        font-size: 20px;
        margin: 15px;
        color: midnightblue;
        font-weight: bold;
        text-shadow: 1px 1px 1px blue;
    }
    button{
        background-color: burlywood;
        border: none;
        color: firebrick;
        border-radius: 6px;
        padding: 5px;
        font-weight: bold;
        transition: ease 0.5s;
    }
    button:hover{
        transform: scale(1.05);
        cursor: pointer;
    }
 </style>
<body>
    <main>
        <div>
            0
        </div>
        <button id="in">
            Increment
        </button>
        <button id="de">
            Decrement
        </button>
    </main>
</body>
</html>
